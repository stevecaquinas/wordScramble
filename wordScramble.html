<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Scramble Game</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    .game-container {
      display: grid;
      grid-template-columns: repeat(6, 60px);
      grid-template-rows: repeat(6, 60px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }

    .cell, .btn {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      border-radius: 6px;
    }

    .cell {
      background-color: #333;
      border: 2px solid #555;
    }

    .cell.correct {
      background-color: green;
    }

    .btn {
      background-color: #444;
      color: white;
      border: none;
      cursor: pointer;
    }

    #moves {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Word Scramble</h1>
  <p>The grid below contains five 5-letter words horizontally.</p>
  <p>Slide rows (→) and columns (↓) to solve!</p>
  <div class="game-container" id="game"></div>
  <p id="moves">Moves: 0</p>

  <script>
    const words = ["STACK", "STARS", "STONE", "TRUCK", "WORMS"];
    const selectedWords = words.slice(0, 5);

    let originalGrid = selectedWords.map(w => w.split(""));
    let grid = JSON.parse(JSON.stringify(originalGrid));
    let moves = 0;

    const game = document.getElementById("game");
    const movesEl = document.getElementById("moves");

    function createGrid() {
      game.innerHTML = "";

      for (let row = 0; row <= 5; row++) {
        for (let col = 0; col <= 5; col++) {
          if (row < 5 && col < 5) {
            const div = document.createElement("div");
            div.className = "cell";
            const char = grid[row][col];
            div.textContent = char;
            if (char === originalGrid[row][col]) {
              div.classList.add("correct");
            }
            game.appendChild(div);
          } else if (row === 5 && col < 5) {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.textContent = "↓";
            btn.onclick = () => {
              rotateColDown(col);
              update();
            };
            game.appendChild(btn);
          } else if (col === 5 && row < 5) {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.textContent = "→";
            btn.onclick = () => {
              rotateRowRight(row);
              update();
            };
            game.appendChild(btn);
          } else {
            const spacer = document.createElement("div");
            spacer.className = "cell";
            spacer.style.background = "transparent";
            game.appendChild(spacer);
          }
        }
      }
    }

    function rotateRowRight(row) {
      const last = grid[row][4];
      for (let i = 4; i > 0; i--) {
        grid[row][i] = grid[row][i - 1];
      }
      grid[row][0] = last;
      moves++;
    }

    function rotateColDown(col) {
      const last = grid[4][col];
      for (let i = 4; i > 0; i--) {
        grid[i][col] = grid[i - 1][col];
      }
      grid[0][col] = last;
      moves++;
    }

    function scramble() {
      for (let i = 0; i < 15; i++) {
        rotateRowRight(Math.floor(Math.random() * 5));
        rotateColDown(Math.floor(Math.random() * 5));
      }
      moves = 0;
      update();
    }

    function update() {
      createGrid();
      movesEl.textContent = `Moves: ${moves}`;
      checkWin();
    }

    function checkWin() {
      const won = grid.every((row, i) => row.join("") === originalGrid[i].join(""));
      if (won) {
        setTimeout(() => alert(`🎉 You solved it in ${moves} moves!`), 100);
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      scramble();
    });
  </script>
</body>
</html>
